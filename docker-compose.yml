version: '3.8'

services:
  fastapi-app:
    build: 
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - searxng
    environment:
      - PYTHONPATH=/app
    networks:
      - search-network

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng_config:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    networks:
      - search-network

networks:
  search-network:
    driver: bridge
